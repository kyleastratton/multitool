</head>
<body>
    <nav class="navbar">
        <!-- <div class="logo">Multitool</div> -->
        <div class="logo">
            <img src="../favicon_io/favicon-32x32.png">
        </div>
        <button class="menu-toggle" aria-label="Toggle Menu">&#9776;</button>
        <ul class="nav-links">
            <li><a href="../index.html">Home</a></li>

    </nav>

    <div class="container">
        <h2>Text Case Converter</h2>
        <h3>Text to convert</h3>
        <input type="text" id="textInput" placeholder="Enter text here">
        <h3>Casing</h3>
        <select id="caseSelector">
            <option value="sentence">Sentence case</option>
            <option value="uppercase">Uppercase</option>
            <option value="lowercase">Lowercase</option>
            <option value="alternating">Alternating Case</option>
            <option value="inverse">Inverse Case</option>
            <option value="snake">Snake Case</option>
            <option value="kebab">Kebab Case</option>
            <option value="camel">Camel Case</option>
            <option value="pascal">Pascal Case</option>
            <option value="screaming_snake">Screaming Snake Case</option>
            <option value="screaming_kebab">Screaming Kebab Case</option>
            <option value="train">Train Case</option>
        </select>
        <button onclick="convertText()">Convert</button>
        <p id="result" onclick="copyToClipboard()"></p>
    </div>

    <div id="snackbar" class="snackbar">Text copied to clipboard!</div>

    <script src="../script.js"></script>
</body>
