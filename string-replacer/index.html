<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>String Replacer</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/favicon_io/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon_io/favicon-16x16.png">
  <link rel="manifest" href="../assets/favicon_io/site.webmanifest">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>

  <nav class="topnav" id="myTopnav">
    <a href="./index.html">
      <img src="../assets/favicon_io/favicon-32x32.png" class="logo" alt="logo">
    </a>
    <a href="../index.html">Home</a>
    <a href="../data-generator/index.html">Data Generator</a>
    <a href="./index.html">Case Converter</a>
    <a href="../character-generator/index.html">Character Generator</a>
    <a href="../list-comparison/index.html">List Comparison</a>
    <a href="../percentage-calculator/index.html">Percentage Calculator</a>
    <a href="../random-picker/index.html">Random Picker</a>
    <a href="../regex-generator/index.html">Regex Generator</a>
    <a href="./index.html" class="active">String Replacer</a>
    <a href="javascript:void(0);" class="icon" onclick="openMenu()">
      <i class="fa fa-bars"></i>
    </a>
  </nav>

  <div class="container">
    <h1>String Replacer</h1>

    <label for="stringInput">Input String:</label>
    <textarea class="margin-bottom" id="stringInput" rows="4" placeholder="Enter your string here..."></textarea>

    <label for="findValue">Find:</label>
    <input class="margin-bottom" type="text" id="findValue" placeholder="Characters to find" placeholder="Please enter a value to find" />

    <label for="replaceValue">Replace With:</label>
    <input class="margin-bottom" type="text" id="replaceValue" placeholder="Replacement characters" placeholder="Please enter value to replace" />

    <button class="button" id="replaceBtn" onclick="replaceString()">Replace</button>

    <div id="result" class="result-box" style="display: none;" onclick="copyToClipboard('result')"/>
  </div>

  <div id="snackbar" class="snackbar">Text copied to clipboard!</div>

  <script src="../script.js"></script>
</body>
</html>
