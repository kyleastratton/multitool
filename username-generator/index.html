    <div class="container">
        <h1>Gamertag Generator</h1>
        <button class="button" onclick="generateGamertag()">Generate Gamertag</button>
        <p id="generatedName">exampleUsername123</p>
        <i class="fa-solid fa-star margin" onclick="saveFavorite()"></i>
        <!-- <button class="button" onclick="saveFavorite()">Save to Favorites</button> -->
    </div>

    <div class="container">
        <div class="list-container"></div>
            <h3>Previous Names</h3>
            <ul id="previousNames" class="margin-bottom"></ul>
            <h3>Favorites</h3>
            <ul id="favoriteNames" class="margin-bottom"></ul>
        </div>
    </div>
    
    <script src="https://kit.fontawesome.com/c14a1ffeb9.js" crossorigin="anonymous"></script>
    <script>
        const adjectives = ["Swift", "Brave", "Dark", "Fierce", "Mighty", "Stealthy", "Crazy", "Epic"];
        const nouns = ["Warrior", "Dragon", "Hunter", "Shadow", "Phantom", "Rogue", "Knight", "Sniper"];
        
        function generateGamertag() {
            const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
            const noun = nouns[Math.floor(Math.random() * nouns.length)];
            const number = Math.floor(Math.random() * 1000);
            const gamertag = `${adj}${noun}${number}`;
            
            document.getElementById("generatedName").textContent = gamertag;
            addToPrevious(gamertag);
        }
        
        function addToPrevious(name) {
            const list = document.getElementById("previousNames");
            const item = document.createElement("li");
            item.textContent = name;
            list.appendChild(item);
        }
        
        function saveFavorite() {
            const name = document.getElementById("generatedName").textContent;
            if (!name) return;
            const list = document.getElementById("favoriteNames");
            const item = document.createElement("li");
            item.textContent = name;
            list.appendChild(item);
        }
    </script>
